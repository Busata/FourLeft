server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # Single-page app: serve static files when they exist, otherwise fall back to
    # index.html so the Angular router can handle the route (e.g. /privacy,
    # /easportswrc/profile/<requestId>). API calls (/api_v2) are routed to the
    # backend by the reverse proxy, not this server.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
