<div class="g-card auth-card">
  <h1 class="auth-title">Create account</h1>
  <p class="auth-sub">Assetto Corsa Rally</p>

  @if (error()) {
    <p class="auth-error">{{ error() }}</p>
  }

  <form [formGroup]="form" (ngSubmit)="submit()">
    <div class="form-group">
      <label>Email</label>
      <input formControlName="email" type="email" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Display name</label>
      <input formControlName="displayName" type="text" autocomplete="nickname" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input formControlName="password" type="password" autocomplete="new-password" />
      <small class="auth-hint">At least 8 characters.</small>
    </div>

    <button class="g-button g-button-primary" type="submit" [disabled]="submitting()">
      {{ submitting() ? 'Creating…' : 'Create account' }}
    </button>
  </form>

  <p class="auth-alt">
    Already have an account? <a routerLink="/acrally/login">Sign in</a>
  </p>
</div>
