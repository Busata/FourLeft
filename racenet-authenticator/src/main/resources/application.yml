spring:
  application:
    name: racenet-authenticator
  config:
    import: "optional:configserver:"
server:
  port: 8082
racenet-authenticator:
  # Dirt Rally 2.0 online servers shut down 2026-07-08; flow left in place but disabled.
  enable-dirt-rally2: false
  enable-ea-wrc: true
  # Run the browser headless by default; override locally (e.g. the "override" profile) to watch the flow.
  headless: true
  # racenet-2fa-relay: captures EA 2FA codes (via Postmark) and serves them on a token-protected endpoint.
  twofactor:
    # Internal address on the shared "veevi" docker network. Override locally if running outside docker.
    base-url: http://racenet-2fa-relay:8085
    # Must match the relay's API_TOKEN. Provide via the config server / override, not in source control.
    api-token: ""
    poll-timeout-seconds: 120
    poll-interval-seconds: 2
