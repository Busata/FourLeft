upstream web {
    ip_hash;
    server proxy.fourleft_frontend:80;
}

upstream easportswrc {
    ip_hash;
    server spring.fourleft.backend-ea-sports-wrc:8084;
}

upstream acrally {
    ip_hash;
    server spring.fourleft.backend-acrally:8085;
}

server {
    location / {
        proxy_pass http://web/;
    }
    location /api_v2/ {
        proxy_pass http://easportswrc;
    }
    location /acrally-api/ {
        proxy_pass http://acrally;
    }

    listen 80;
    server_name fourleft.io;
    client_max_body_size 20M;
}
