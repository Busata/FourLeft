upstream web {
    ip_hash;
    server proxy.fourleft_frontend:80;
}

upstream easportswrc {
    ip_hash;
    server spring.fourleft.backend-ea-sports-wrc:8084;
}

upstream acrally {
    ip_hash;
    server spring.fourleft.backend-acrally:8085;
}

server {
    location / {
        proxy_pass http://web/;
    }
    location /api_v2/ {
        proxy_pass http://easportswrc;
    }
    location /acrally-api/ {
        proxy_pass http://acrally;
    }

    # acrally-agent release channel: static files served from /srv/acrally-agent
    # (a host dir mounted into this container). Publishing a release is just
    # uploading the exe + .minisig, then latest.json — no app rebuild.
    #
    # The version pointer must stay fresh so agents notice new releases quickly;
    # the exact-match location outranks the prefix below.
    location = /acrally-agent/latest.json {
        root /srv;
        default_type application/json;
        add_header Cache-Control "public, max-age=60";
    }
    # Versioned binaries + detached signatures never change — cache them hard.
    location /acrally-agent/ {
        root /srv;
        autoindex off;
        default_type application/octet-stream;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    listen 80;
    server_name fourleft.io;
    client_max_body_size 20M;
}
