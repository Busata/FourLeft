version: '3.5'
services:
  racenet-2fa-relay:
    build: .
    container_name: racenet-2fa-relay
    restart: always
    env_file:
      - .env
    environment:
      # Routed by the nginx-proxy edge (same mechanism as proxy.fourleft-reverse-proxy).
      # Point the 2fa-relay.fourleft.io DNS record at this host and nginx-proxy + the
      # letsencrypt companion handle vhost routing and TLS automatically.
      - VIRTUAL_HOST=2fa-relay.fourleft.io
      - VIRTUAL_PORT=8085
      - LETSENCRYPT_HOST=2fa-relay.fourleft.io
    expose:
      - "8085"

networks:
  default:
    name: veevi
    external: true
