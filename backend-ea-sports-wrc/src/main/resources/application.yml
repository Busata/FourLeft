spring:
  application:
    name: backend-easportswrc
  config:
    import: "optional:configserver:"
  jpa:
    open-in-view: false
  datasource:
    driver-class-name: org.postgresql.Driver

server:
  port: 8084

racenet-api:
  url: https://web-api.racenet.com

club-export:
  output-directory: /tmp/club-exports
  scheduling-enabled: true

time-trial-sync:
  # Two triggers that enqueue TT_FETCH jobs: the board "Sync" button and the hourly refresh sweep.
  manual-cooldown-hours: 3      # min age of a board's last fetch before a user may re-sync it
  refresh-interval-hours: 48    # a board older than this is picked up by the scheduled sweep
  sweep-enabled: true           # master switch for the scheduled refresh
  sweep-batch-limit: 500        # max fetches enqueued per sweep tick (catch-up guard)

work-queue:
  # DB-backed club import queue. When enabled it owns club scheduling and the 5s
  # ClubUpdateSchedule cron stands down.
  enabled: true
  max-concurrent-jobs: 5
  schedule-tick-ms: 5000
  work-tick-ms: 1000
  prune-tick-ms: 3600000
  schedule-batch-size: 100
  max-horizon-seconds: 3600
  in-flight-grace-seconds: 120
  stale-job-seconds: 600
  done-retention-hours: 24
  failed-retention-hours: 336

resilience4j:
  ratelimiter:
    rateLimiterAspectOrder: 101   # inside retry, so each retry re-acquires a permit
    instances:
      # Throttles the time-trial probe/fetch sweep. GLOBAL across all concurrent probe jobs, so this
      # is the real "keep it gentle" knob: limitForPeriod / limitRefreshPeriod = max Racenet calls/sec.
      # Keep it high enough that a per-rally probe job (<=684 calls, shared by up to
      # work-queue.max-concurrent-jobs jobs) finishes inside stale-job-seconds (600s) — i.e. don't drop
      # much below ~7/s while probes are per-rally.
      racenet-timetrial:
        limit-for-period: 8
        limit-refresh-period: 1s
        timeout-duration: 30s
  retry:
    retryAspectOrder: 100
    instances:
      racenet-timetrial:
        max-attempts: 4
        wait-duration: 1s
        enable-exponential-backoff: true
        exponential-backoff-multiplier: 2
        exponential-max-wait-duration: 20s
        retry-exceptions:
          - feign.FeignException$TooManyRequests
          - feign.FeignException$BadGateway
          - feign.FeignException$ServiceUnavailable
          - feign.FeignException$GatewayTimeout
          - feign.RetryableException