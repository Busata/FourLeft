spring:
  application:
    name: backend-acrally
  config:
    import: "optional:configserver:"
  jpa:
    open-in-view: false
    hibernate:
      # Flyway owns the schema; Hibernate never mutates it.
      ddl-auto: validate
  datasource:
    driver-class-name: org.postgresql.Driver
  session:
    # Sessions are stored in Postgres (spring-session-jdbc) so they survive deploys and
    # stay instantly revocable server-side. Flyway owns the tables (V020).
    jdbc:
      initialize-schema: never
    # Idle expiry, refreshed on every authenticated request.
    timeout: 30d

server:
  port: 8085
  servlet:
    session:
      cookie:
        # Persistent cookie so closing the browser doesn't log people out. Fixed at login
        # (not sliding), so the hard ceiling on a session is 30 days regardless of activity.
        max-age: 30d
  # Behind the TLS-terminating reverse proxy in prod: honour X-Forwarded-* so the app
  # knows requests are https (correct scheme + Secure session/CSRF cookies). No-op locally.
  forward-headers-strategy: framework
  error:
    # Surface ResponseStatusException reasons in the JSON body so the admin UI can show why an
    # action was rejected (e.g. "This location still has stages assigned to it."). Admin-only API.
    include-message: always
  compression:
    enabled: true
    mime-types: application/json
    min-response-size: 2048

acrally:
  # Origin the browser + Steam use to reach this service. Prod goes through the reverse
  # proxy on the public host; local dev talks to the backend port directly (override).
  public-base-url: https://fourleft.io
  agent:
    # Oldest acrally-agent the ingestion endpoints accept. Older agents get 426 Upgrade
    # Required, which makes them self-update and relaunch. Bump whenever the agent wire
    # contract changes (keep it <= the version published in the release channel); blank
    # disables the gate.
    min-version: "0.3.8"
  steam:
    # Where the browser lands after the Steam sign-in round-trip.
    success-path: /acrally/dashboard
    failure-path: /acrally/login
    # Steam Web API key (steamcommunity.com/dev/apikey). Prod supplies it via the config
    # server; blank here means the profile fetch is skipped (linking still works).
    web-api-key: ""
